name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  release:
    runs-on: macos-latest
    steps:
      # ── Fail fast if Apple credentials are absent ──────────────────────
      - name: Verify Apple signing credentials
        run: |
          missing=()
          [[ -z "$APPLE_CERTIFICATE"          ]] && missing+=("APPLE_CERTIFICATE")
          [[ -z "$APPLE_CERTIFICATE_PASSWORD" ]] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -z "$KEYCHAIN_PASSWORD"          ]] && missing+=("KEYCHAIN_PASSWORD")
          [[ -z "$APPLE_ID"                   ]] && missing+=("APPLE_ID")
          [[ -z "$APPLE_PASSWORD"             ]] && missing+=("APPLE_PASSWORD")
          [[ -z "$APPLE_TEAM_ID"              ]] && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            echo "Set these at: https://github.com/TheCountOfSaintGermain/nausilus/settings/secrets/actions"
            exit 1
          fi

      # ── Import Apple Developer Certificate ──────────────────────────────
      - name: Import Apple certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Derive the actual signing identity from the imported cert
          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          if [[ -z "$CERT_ID" ]]; then
            echo "ERROR: No Developer ID Application certificate found after import."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "CERT_ID=${CERT_ID}" >> $GITHUB_ENV
          echo "Keychain path: ${KEYCHAIN_PATH}"

      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node ─────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── Setup Rust ─────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      # ── Install frontend dependencies ──────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build, Sign, Notarize, and Package via tauri-action ───────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nausilus ${{ github.ref_name }}"
          releaseBody: |
            Nausilus is a lightweight macOS desktop companion featuring a gently pulsing jellyfish animation.

            ## Downloads
            Download the .dmg below, then open it and drag Nausilus.app to your Applications folder.
            On first launch macOS may ask you to confirm — click Open.
          releaseDraft: false
          prerelease: false
          artifactPatterns: |
            *.dmg

      # ── Find and verify the produced DMG ─────────────────────────────
      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find src-tauri/target/*/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          if [[ -z "$DMG" ]]; then
            echo "ERROR: No .dmg found in bundle output"
            ls -la src-tauri/target/*/release/bundle/ 2>/dev/null || true
            exit 1
          fi
          echo "DMG_PATH=${DMG}" >> $GITHUB_ENV
          echo "Found: ${DMG}"
          ls -lh "${DMG}"

      # Mount DMG and verify the app bundle signature
      - name: Verify signature and notarization
        run: |
          hdiutil attach "${{ env.DMG_PATH }}" \
            -mountpoint /tmp/nausilus-verify -nobrowse -quiet
          APP_BUNDLE=$(find /tmp/nausilus-verify -name "*.app" -type d | head -1)
          echo "Verifying bundle: ${APP_BUNDLE}"
          codesign --verify --deep --strict --verbose=4 "${APP_BUNDLE}"
          spctl -a -vvv -t exec "${APP_BUNDLE}"
          xcrun stapler validate "${APP_BUNDLE}"
          hdiutil detach /tmp/nausilus-verify -quiet
